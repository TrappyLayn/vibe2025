<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>To-Do List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #todoList {
            border-collapse: collapse;
            width: 70%;
            margin: 0 auto;
        }
        #todoList th, #todoList td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        #todoList th {
            background-color: #f0f0f0;
        }
        #todoList th:first-child, #todoList th:last-child {
            width: 5%;
        }
        #todoList th:nth-child(2) {
            width: 90%;
        }
        .add-form {
            margin-top: 20px;
            width: 70%;
            margin: 20px auto;
        }
        .add-form input[type="text"] {
            padding: 8px;
            width: 70%;
        }
        .add-form button {
            padding: 8px;
            width: 20%;
        }
        input[type="text"].edit-input {
            width: 90%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<h2 style="text-align: center;">To-Do List</h2>

<table id="todoList">
    <thead>
        <tr>
            <th>Number</th>
            <th>Text</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="listBody">
        {{rows}}
    </tbody>
</table>

<div class="add-form">
    <input type="text" id="newItem" placeholder="Enter new item" />
    <button onclick="addItem()">Add</button>
</div>

<script>
    function addItem() {
        const newItemInput = document.getElementById('newItem');
        const newItemText = newItemInput.value.trim();

        if (!newItemText) return;

        fetch('/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: newItemText })
        })
        .then(response => response.json())
        .then(result => {
            if (result.success) {
                window.location.reload();
            } else {
                alert('Error adding item: ' + (result.message || 'Unknown error'));
            }
        })
        .catch(() => alert('Failed to add item!'));
    }

    function deleteItem(id) {
        if (!confirm('Are you sure you want to delete this item?')) return;

        fetch('/delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id })
        })
        .then(response => response.json())
        .then(result => {
            if (result.success) {
                window.location.reload();
            } else {
                alert('Error deleting item: ' + (result.message || 'Unknown error'));
            }
        })
        .catch(() => alert('Failed to delete item!'));
    }

    function enableEdit(td, id) {
        if (td.querySelector('input')) return; // already editing

        const currentText = td.textContent;
        td.innerHTML = `<input type="text" class="edit-input" value="${currentText.replace(/"/g, '&quot;')}" />`;

        const input = td.querySelector('input');
        input.focus();

        // Save changes on Enter or blur
        input.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                input.blur();
            } else if (e.key === 'Escape') {
                td.textContent = currentText;
            }
        });

        input.addEventListener('blur', () => {
            const newText = input.value.trim();
            if (newText && newText !== currentText) {
                updateItem(id, newText, td);
            } else {
                td.textContent = currentText;
            }
        });
    }

    function updateItem(id, newText, td) {
        fetch('/update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id, text: newText })
        })
        .then(response => response.json())
        .then(result => {
            if (result.success) {
                td.textContent = newText;
            } else {
                alert('Error updating item: ' + (result.message || 'Unknown error'));
                td.textContent = newText; // or revert to old text if preferred
            }
        })
        .catch(() => {
            alert('Failed to update item!');
            td.textContent = newText; // or revert
        });
    }
</script>

</body>
</html>
